<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Style Mockup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f3f4;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Browser Top Bar (Tabs) */
        .browser-top {
            background-color: #dee1e6;
            padding: 8px 8px 0 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tab {
            background-color: #dee1e6;
            padding: 8px 16px;
            border-radius: 8px 8px 0 0;
            font-size: 12px;
            color: #5f6368;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: none;
        }

        .tab.active {
            background-color: #ffffff;
            color: #3c4043;
        }

        .tab-close {
            font-size: 14px;
            margin-left: auto;
        }

        .new-tab-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #5f6368;
            cursor: pointer;
            padding: 0 8px;
        }

        /* Address Bar Area */
        .toolbar {
            background-color: #ffffff;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #ddd;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #5f6368;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .nav-btn:hover {
            background-color: #e8eaed;
        }

        .address-bar {
            flex-grow: 1;
            background-color: #f1f3f4;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 14px;
            color: #3c4043;
            border: 1px solid transparent;
            transition: border 0.2s;
            cursor: text;
        }

        .address-bar:hover {
            border: 1px solid #ced4da;
        }

        /* Web Content Area */
        .content {
            flex-grow: 1;
            background-color: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .google-logo {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .google-logo span:nth-child(1) { color: #4285F4; }
        .google-logo span:nth-child(2) { color: #EA4335; }
        .google-logo span:nth-child(3) { color: #FBBC05; }
        .google-logo span:nth-child(4) { color: #4285F4; }
        .google-logo span:nth-child(5) { color: #34A853; }
        .google-logo span:nth-child(6) { color: #EA4335; }

        .search-container {
            width: 100%;
            max-width: 584px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
            box-shadow: none;
            transition: box-shadow 0.2s;
        }

        .search-input:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: rgba(223,225,229,0);
        }

        .search-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 14px;
            border: 1px solid #f8f9fa;
            background-color: #f8f9fa;
            color: #3c4043;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 1px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>

    <!-- Browser Top (Tabs) -->
    <div class="browser-top">
        <div class="tab active">
            <span>새 탭</span>
            <span class="tab-close">×</span>
        </div>
        <button class="new-tab-btn">+</button>
    </div>

    <!-- Browser Toolbar -->
    <div class="toolbar">
        <button class="nav-btn">←</button>
        <button class="nav-btn">→</button>
        <button class="nav-btn">↻</button>
        <div class="address-bar">https://www.google.com</div>
        <button class="nav-btn">⋮</button>
    </div>

    <!-- Page Content -->
    <div class="content">
        <div class="google-logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Google 검색 또는 URL 입력">
        </div>
        <div class="search-buttons">
            <button class="btn">Google 검색</button>
            <button class="btn">I'm Feeling Lucky</button>
        </div>
    </div>

</body>
</html>
