<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — AI Assistant</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0b0b0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="/static/images.png">
<style>
/* ─── idino 컬러 팔레트 ─── */
:root {
  --bg-primary: #0b0b0c;
  --bg-secondary: #14171B;
  --bg-tertiary: #1d2128;
  --bg-input: #202225;
  --bg-message-user: #00479d;
  --bg-message-assistant: #1d2128;
  --bg-hover: #2b2e32;
  --text-primary: #f0f0f0;
  --text-secondary: #a1a1a1;
  --text-muted: #6c737d;
  --accent: #00479d;
  --accent-light: #0e70b4;
  --accent-hover: #005087;
  --border: #2b2e32;
  --border-light: #363a3f;
  --scrollbar: #41454b;
  --success: #209445;
  --error: #DA017F;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── 헤더 ─── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-logo { width: 28px; height: 28px; border-radius: 6px; }

.header-title { font-size: 15px; font-weight: 600; }

.header-subtitle { font-size: 12px; color: var(--text-muted); margin-left: 8px; }

.header-right { display: flex; align-items: center; gap: 12px; }

.header-btn {
  background: none;
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}

.header-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success); display: inline-block;
}
.status-dot.offline { background: var(--error); }

/* ─── 토큰 카운터 ─── */
.token-counter {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-muted);
  padding: 3px 8px;
  background: var(--bg-primary);
  border-radius: 4px;
  border: 1px solid var(--border);
}

.token-counter span { font-variant-numeric: tabular-nums; }

/* ─── 사이드바 ─── */
.layout { display: flex; flex: 1; overflow: hidden; position: relative; }

.sidebar {
  width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.25s ease, opacity 0.25s ease;
  position: absolute;
  left: 0; top: 0; bottom: 0;
  z-index: 10;
  transform: translateX(0);
  opacity: 1;
}

.sidebar.collapsed {
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
}

.sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.new-chat-btn {
  flex: 1;
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s;
}
.new-chat-btn:hover { background: var(--accent-hover); }

.sidebar-close-btn {
  background: none;
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
  width: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.15s;
}
.sidebar-close-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

.session-list { flex: 1; overflow-y: auto; padding: 8px; }

.session-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 2px;
  transition: background 0.1s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--bg-tertiary); color: var(--text-primary); }

/* 세션 항목의 제목 — 긴 텍스트는 말줄임 */
.session-title {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 세션 삭제 버튼 — 평소엔 숨기고 hover 시 노출 */
.session-delete-btn {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1;
  opacity: 0;
  transition: opacity 0.1s, background 0.1s, color 0.1s;
}
.session-item:hover .session-delete-btn,
.session-item.active .session-delete-btn {
  opacity: 0.7;
}
.session-delete-btn:hover {
  opacity: 1 !important;
  background: rgba(220, 38, 38, 0.15);
  color: #ef4444;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
}

/* ─── 메인 영역 ─── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.messages { flex: 1; overflow-y: auto; padding: 24px 0; }

.messages-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ─── 환영 화면 ─── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  text-align: center;
}

.welcome-logo {
  width: 56px; height: 56px;
  margin-bottom: 20px;
  opacity: 0.9;
  border-radius: 12px;
}

.welcome h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }

.welcome p {
  font-size: 14px;
  color: var(--text-secondary);
  max-width: 400px;
  line-height: 1.6;
}

/* ─── 메시지 버블 ─── */
.message { margin-bottom: 24px; animation: fadeIn 0.2s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.message-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}

.message-avatar.user { background: var(--bg-message-user); color: #fff; }
.message-avatar.assistant { background: var(--accent); color: #fff; }

.message-sender { font-size: 13px; font-weight: 600; }

.message-body {
  padding-left: 32px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-primary);
  word-wrap: break-word;
}

.message-body p { margin-bottom: 8px; }
.message-body p:last-child { margin-bottom: 0; }

.message-body pre {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  margin: 8px 0;
  font-size: 13px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

.message-body code {
  background: var(--bg-hover);
  padding: 2px 5px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

.message-body pre code { background: none; padding: 0; }

/* ─── 스트리밍 커서 ─── */
.streaming-cursor::after {
  content: '';
  display: inline-block;
  width: 7px; height: 16px;
  background: var(--accent-light);
  margin-left: 2px;
  animation: blink 0.8s infinite;
  vertical-align: text-bottom;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ─── 입력 영역 ─── */
.input-area {
  padding: 16px 20px 20px;
  flex-shrink: 0;
}

.input-container {
  max-width: 720px;
  margin: 0 auto;
  position: relative;
}

.input-box {
  display: flex;
  align-items: center;
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 8px 12px;
  gap: 8px;
  transition: border-color 0.15s;
}

.input-box:focus-within { border-color: var(--accent); }

/* 첨부 버튼 */
.attach-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: color 0.15s;
}
.attach-btn:hover { color: var(--text-primary); }
.attach-btn svg { width: 18px; height: 18px; }

.input-box textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  max-height: 150px;
  line-height: 21px;
  padding: 4px 0;
}

.input-box textarea::placeholder { color: var(--text-muted); }

.send-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; }

.input-footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
}

/* 첨부파일 프리뷰 */
.attach-preview {
  display: none;
  padding: 6px 12px;
  margin-bottom: 4px;
}

.attach-preview.visible { display: flex; flex-wrap: wrap; gap: 6px; }

.attach-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--text-secondary);
}

.attach-chip .remove {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1;
}
.attach-chip .remove:hover { color: var(--error); }

/* 숨겨진 파일 입력 */
#fileInput { display: none; }

/* ─── 로딩 인디케이터 ─── */
.thinking {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-left: 32px;
  color: var(--text-muted);
  font-size: 13px;
  margin-bottom: 16px;
}

/* ─── Qwen thinking 블록 (Claude hmm... 스타일) ─── */
.model-thinking {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  padding: 6px 10px;
  margin-bottom: 8px;
  border-left: 2px solid var(--border);
  background: var(--bg-primary);
  border-radius: 0 4px 4px 0;
  opacity: 0.7;
  max-height: 60px;
  overflow: hidden;
  transition: max-height 0.3s;
  cursor: pointer;
}
.model-thinking:hover { max-height: 300px; opacity: 1; }
.model-thinking::before { content: "thinking... "; font-weight: 500; }

/* ─── 목록 (bullet point) ─── */
.message-body ul { margin: 4px 0; padding-left: 20px; }
.message-body li { margin-bottom: 4px; line-height: 1.6; }

.thinking-dots span {
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: dot-pulse 1.4s infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ─── 반응형 ─── */
@media (max-width: 768px) {
  .sidebar { width: 100%; }
  .messages-inner { padding: 0 12px; }
  .input-area { padding: 12px; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <button class="header-btn" onclick="toggleSidebar()" title="세션 목록">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <img src="/static/images.png" alt="Nexus" class="header-logo">
    <span class="header-title">Nexus</span>
    <span class="header-subtitle">by IDINO</span>
  </div>
  <div class="header-right">
    <div class="token-counter" id="tokenCounter" title="누적 토큰 사용량">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span>IN: <b id="tokenIn">0</b></span>
      <span>OUT: <b id="tokenOut">0</b></span>
    </div>
    <span class="status-dot" id="statusDot" title="GPU 서버 상태"></span>
  </div>
</div>

<!-- 레이아웃 -->
<div class="layout">

  <!-- 사이드바 (기본 닫힘) -->
  <div class="sidebar collapsed" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="newSession()">+ 새 대화</button>
      <button class="sidebar-close-btn" onclick="toggleSidebar()">&times;</button>
    </div>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer">Nexus v0.1.0</div>
  </div>

  <!-- 메인 -->
  <div class="main">
    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner">
        <div class="welcome" id="welcome">
          <img src="/static/images.png" alt="Nexus" class="welcome-logo">
          <h2>IDINO Nexus 입니다. 어떤 도움을 드릴까요?</h2>
          <p>일반대화 · 코드 분석 · 문서 분석</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <!-- 첨부파일 프리뷰 -->
        <div class="attach-preview" id="attachPreview"></div>
        <div class="input-box">
          <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="파일 첨부">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input type="file" id="fileInput" multiple accept=".txt,.py,.js,.ts,.json,.yaml,.yml,.md,.csv,.html,.css,.sql,.xml,.log,.pdf,.docx,.hwp,.xlsx" onchange="handleFileSelect(event)">
          <textarea id="userInput"
                    placeholder="메시지를 입력하세요..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">Qwen 3.5 27B (INT4) — Nexus는 실수할 수 있습니다</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── 상태 ───
let sessions = [];
let currentSessionId = null;
let isStreaming = false;
let attachedFiles = [];
let totalInputTokens = 0;
let totalOutputTokens = 0;

// ─── 초기화 ───
window.addEventListener('DOMContentLoaded', () => {
  checkHealth();
  newSession();
  // Ch 16: 서버에 저장된 과거 세션을 사이드바에 머지
  loadServerSessions();
  // 사이드바 클릭 위임 — 인라인 onclick의 escape 취약성 제거 (v0.14.7)
  setupSessionListDelegation();
  document.getElementById('userInput').focus();
});

// 사이드바 컨테이너에 단일 click 리스너를 붙여
// .session-item / .session-delete-btn 클릭을 위임 처리한다.
// 인라인 onclick + JSON.stringify + escapeHtml 이중 처리는 일부 환경에서
// 따옴표/특수문자가 깨질 수 있어, 데이터 속성(data-sid) 기반으로 단순화.
function setupSessionListDelegation() {
  const list = document.getElementById('sessionList');
  if (!list) return;
  list.addEventListener('click', (ev) => {
    const target = ev.target;
    // 삭제 버튼이 우선
    const delBtn = target.closest && target.closest('.session-delete-btn');
    if (delBtn) {
      const sid = delBtn.getAttribute('data-sid');
      console.log('[session] delete click sid=', sid);
      ev.stopPropagation();
      if (sid) deleteSession(sid, ev);
      return;
    }
    const item = target.closest && target.closest('.session-item');
    if (item) {
      const sid = item.getAttribute('data-sid');
      console.log('[session] switch click sid=', sid);
      if (sid) switchSession(sid);
    }
  });
}

// HTML 특수문자 이스케이프 (서버에서 받은 session_id/메시지를 innerHTML에 넣을 때 사용)
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// 세션 제목 후보 — 첫 user 메시지 30자 → 없으면 session_id 뒷부분
function deriveSessionTitle(session) {
  // 서버에서 title_hint를 받아온 경우 최우선 사용 (파일 한 번 더 읽지 않음)
  if (session.titleHint) {
    const t = String(session.titleHint).trim().replace(/\s+/g, ' ');
    return t.length > 30 ? t.slice(0, 30) + '…' : t;
  }
  // 메시지가 이미 로드됐다면 그중 첫 user 메시지를 쓴다
  const firstUser = (session.messages || []).find(m => m.role === 'user');
  if (firstUser && firstUser.content) {
    const t = String(firstUser.content).trim().replace(/\s+/g, ' ');
    return t.length > 30 ? t.slice(0, 30) + '…' : t;
  }
  // session-1776929625 같은 형태면 뒷자리만, UUID면 앞 8자
  const id = session.id || '';
  if (id.startsWith('session-')) return id.slice(0, 18);
  return id.length > 12 ? id.slice(0, 8) + '…' : id;
}

// ─── 세션 관리 ───
function newSession() {
  const id = 'session-' + Date.now();
  const session = { id, title: '새 대화', messages: [], source: 'local' };
  sessions.unshift(session);
  currentSessionId = id;
  renderSessionList();
  clearMessages();
  totalInputTokens = 0;
  totalOutputTokens = 0;
  updateTokenDisplay();
}

async function switchSession(id) {
  console.log('[session] switchSession called id=', id);
  currentSessionId = id;
  renderSessionList();
  let session = sessions.find(s => s.id === id);
  clearMessages();
  if (!session) {
    console.warn('[session] not in local list — creating shell');
    session = { id, title: id, messages: [], source: 'server' };
    sessions.push(session);
  }

  // 로컬 캐시가 비어 있으면 (source 종류와 무관하게) 무조건 서버에 시도.
  // 서버에 없으면 404 — 그땐 빈 화면으로 둔다 (새 대화처럼 동작).
  // v0.14.7: 이전엔 source==='server'일 때만 fetch했으나 race·source 누락 등에서
  // 안 되는 경우가 있었음. 단순화 — "비어 있으면 일단 서버에 물어본다".
  if (!session.messages || session.messages.length === 0) {
    try {
      const url = `/v1/sessions/${encodeURIComponent(id)}/messages`;
      console.log('[session] GET', url);
      const resp = await fetch(url);
      console.log('[session]   ← status', resp.status);
      if (resp.ok) {
        const data = await resp.json();
        const msgs = (data.messages || []).map(m => ({
          role: m.role, content: m.content,
        }));
        session.messages = msgs;
        session.title = deriveSessionTitle(session);
        renderSessionList();
        console.log('[session] loaded', msgs.length, 'messages from', data.source);
      } else if (resp.status === 404) {
        // 새 대화: 사용자에게 굳이 알리지 않는다 (빈 화면이면 충분)
        console.log('[session] 404 — empty session');
        return;
      } else {
        appendMessage('system', `세션 로드 실패 (HTTP ${resp.status})`, false);
        return;
      }
    } catch (err) {
      console.error('[session] fetch error', err);
      appendMessage('system', `세션 로드 오류: ${err && err.message}`, false);
      return;
    }
  }

  session.messages.forEach(m => appendMessage(m.role, m.content, false));
}

// 페이지 시작 시 서버 세션 목록을 사이드바에 머지한다.
// 클릭 시점까지 메시지는 로드하지 않음 — 사이드바는 가볍게 유지.
async function loadServerSessions() {
  try {
    const resp = await fetch('/v1/sessions');
    if (!resp.ok) return;
    const data = await resp.json();
    const items = data.sessions || [];
    const known = new Set(sessions.map(s => s.id));
    let added = 0;
    for (const it of items) {
      const sid = it.session_id;
      if (!sid || known.has(sid)) continue;
      const item = {
        id: sid,
        titleHint: it.title_hint || null,   // 서버가 계산해준 첫 user 메시지 요약
        messages: [],                        // 클릭 시점에 lazy-load
        source: 'server',
        last_modified: it.last_modified || null,
        entries: it.entries || null,
      };
      item.title = deriveSessionTitle(item);
      sessions.push(item);
      added++;
    }
    if (added > 0) renderSessionList();
  } catch (err) {
    // 서버 세션 머지는 best-effort — 실패해도 신규 채팅은 정상 동작
    console.warn('서버 세션 목록 로드 실패:', err);
  }
}

// 세션 삭제 — 사이드바 X 버튼에서 호출. 서버(Redis + 트랜스크립트) 정리 후
// 로컬 sessions 배열에서도 제거하고 사이드바를 다시 그린다.
async function deleteSession(id, event) {
  // 위임 핸들러가 이미 stopPropagation 했지만 직접 호출 경로 보호용으로 유지
  if (event && event.stopPropagation) {
    event.stopPropagation();
  }
  const session = sessions.find(s => s.id === id);
  const label = session ? (session.title || id) : id;
  if (!confirm(`대화를 삭제하시겠습니까?\n\n${label}`)) return;

  // 서버 세션(과 로컬에서 이미 서버에 저장된 대화)은 DELETE 호출이 필요.
  // 빈 로컬 세션(아직 서버에 저장된 적 없는 "새 대화")은 서버 호출 생략.
  const hasServerRecord = !session || session.source === 'server' || (session.messages && session.messages.length > 0);
  if (hasServerRecord) {
    try {
      const resp = await fetch(`/v1/sessions/${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (!resp.ok && resp.status !== 404) {
        alert(`삭제 실패 (HTTP ${resp.status})`);
        return;
      }
    } catch (err) {
      alert(`삭제 오류: ${err.message}`);
      return;
    }
  }

  // 로컬 상태 정리
  const idx = sessions.findIndex(s => s.id === id);
  if (idx >= 0) sessions.splice(idx, 1);

  // 현재 선택 세션을 지웠다면 새 세션을 연다
  if (currentSessionId === id) {
    if (sessions.length > 0) {
      switchSession(sessions[0].id);
    } else {
      newSession();
    }
  } else {
    renderSessionList();
  }
}

function renderSessionList() {
  const list = document.getElementById('sessionList');
  // 인라인 onclick 제거 — 컨테이너 위임(setupSessionListDelegation)이 클릭을 잡아간다.
  // 데이터는 data-sid 속성으로 안전하게 전달 (escape는 escapeHtml 한 번만).
  list.innerHTML = sessions.map(s => {
    const cls = s.id === currentSessionId ? 'active' : '';
    const title = escapeHtml(s.title || s.id);
    const sid = escapeHtml(s.id);
    return (
      `<div class="session-item ${cls}" data-sid="${sid}">
        <span class="session-title">${title}</span>
        <button class="session-delete-btn" title="대화 삭제" data-sid="${sid}">×</button>
       </div>`
    );
  }).join('');
}

// ─── 첨부파일 ───
function handleFileSelect(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => {
    if (file.size > 10 * 1024 * 1024) {
      alert(`파일이 너무 큽니다 (10MB 제한): ${file.name}`);
      return;
    }
    attachedFiles.push(file);
  });
  renderAttachPreview();
  event.target.value = '';
}

function renderAttachPreview() {
  const preview = document.getElementById('attachPreview');
  if (attachedFiles.length === 0) {
    preview.className = 'attach-preview';
    preview.innerHTML = '';
    return;
  }
  preview.className = 'attach-preview visible';
  preview.innerHTML = attachedFiles.map((f, i) =>
    `<div class="attach-chip">
      <span>${f.name} (${(f.size / 1024).toFixed(1)}KB)</span>
      <span class="remove" onclick="removeFile(${i})">&times;</span>
    </div>`
  ).join('');
}

function removeFile(index) {
  attachedFiles.splice(index, 1);
  renderAttachPreview();
}

async function readFileContents() {
  // 바이너리 파일 확장자 — 서버에 업로드하여 Scout 서브에이전트가 분석
  const binaryExts = ['.docx', '.doc', '.xlsx', '.xls', '.pdf', '.hwp', '.pptx'];
  // 텍스트 파일 최대 문자 수
  const MAX_CHARS = 12000;

  const contents = [];
  for (const file of attachedFiles) {
    const ext = '.' + file.name.split('.').pop().toLowerCase();

    if (binaryExts.includes(ext)) {
      // 바이너리 파일 → 서버 업로드 후 Scout 서브에이전트로 위임
      // (Worker 컨텍스트(8K)에 원문을 직접 적재하지 않기 위함)
      const uploadPath = await uploadFileToServer(file);
      if (uploadPath) {
        contents.push(
          `사용자가 문서 파일을 업로드했습니다.\n` +
          `파일명: ${file.name}\n` +
          `서버 경로: ${uploadPath}\n` +
          `Agent 도구를 사용해 subagent_type="scout"으로 이 파일을 분석하고 ` +
          `요약을 받아 주세요. scout가 DocumentProcess로 청크별로 읽어 ` +
          `핵심 내용만 반환할 것입니다.`
        );
      } else {
        contents.push(`[첨부파일 업로드 실패: ${file.name}]`);
      }
      continue;
    }

    let text = await file.text();
    if (text.length > MAX_CHARS) {
      text = text.substring(0, MAX_CHARS) +
        `\n\n... [파일이 길어 ${MAX_CHARS}자까지만 포함됨. 전체 ${text.length}자 중 일부.]`;
    }
    contents.push(`[첨부파일: ${file.name}]\n${text}`);
  }
  return contents.join('\n\n');
}

async function uploadFileToServer(file) {
  try {
    const formData = new FormData();
    formData.append('file', file);
    const resp = await fetch('/v1/upload', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.status === 'ok') {
      return data.file_path;
    }
    return null;
  } catch (e) {
    console.error('파일 업로드 실패:', e);
    return null;
  }
}

// ─── 메시지 표시 ───
function appendMessage(role, content, save = true) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const inner = document.getElementById('messagesInner');
  const div = document.createElement('div');
  div.className = 'message';

  const sender = role === 'user' ? '사용자' : 'Nexus';
  const avatarHtml = role === 'user'
    ? `<div class="message-avatar user">U</div>`
    : `<img src="/static/images.png" alt="N" class="message-avatar assistant" style="object-fit:cover;">`;

  div.innerHTML = `
    <div class="message-header">
      ${avatarHtml}
      <div class="message-sender">${sender}</div>
    </div>
    <div class="message-body">${formatContent(content)}</div>`;

  inner.appendChild(div);
  scrollToBottom();

  if (save) {
    const session = sessions.find(s => s.id === currentSessionId);
    if (session) {
      session.messages.push({ role, content });
      if (role === 'user' && session.title === '새 대화') {
        session.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
        renderSessionList();
      }
    }
  }
  return div;
}

function formatContent(text) {
  // 코드 블록
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });
  // 인라인 코드
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 볼드
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // bullet point: "- 항목" 또는 "* 항목" → <ul><li>
  const lines = text.split('\n');
  let result = [];
  let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^[-*]\s+/.test(trimmed)) {
      if (!inList) { result.push('<ul>'); inList = true; }
      result.push(`<li>${trimmed.replace(/^[-*]\s+/, '')}</li>`);
    } else {
      if (inList) { result.push('</ul>'); inList = false; }
      result.push(line);
    }
  }
  if (inList) result.push('</ul>');
  text = result.join('\n');

  // 단락
  text = text.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  return text;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── 스피너 ───
// _thinkingStartedAt은 장기 대기 감지용. 60초가 넘으면 안내 문구를 바꿔
// 사용자가 "무한 로딩"으로 오해하지 않게 한다. _thinkingTimer는 주기 갱신 핸들.
let _thinkingStartedAt = 0;
let _thinkingTimer = null;
const LONG_WAIT_SECONDS = 60;

function showThinking() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const inner = document.getElementById('messagesInner');
  const div = document.createElement('div');
  div.id = 'thinkingIndicator';
  div.className = 'message';
  div.innerHTML = `
    <div class="message-header">
      <img src="/static/images.png" alt="N" class="message-avatar assistant" style="object-fit:cover;">
      <div class="message-sender">Nexus</div>
    </div>
    <div class="thinking">
      <span id="thinkingLabel">생각하는 중</span>
      <div class="thinking-dots"><span></span><span></span><span></span></div>
    </div>`;
  inner.appendChild(div);
  scrollToBottom();

  // 장기 대기 감지 — 초 단위로 업데이트. 60초 넘으면 문구 전환.
  _thinkingStartedAt = Date.now();
  if (_thinkingTimer) clearInterval(_thinkingTimer);
  _thinkingTimer = setInterval(() => {
    const label = document.getElementById('thinkingLabel');
    if (!label) return;
    const elapsed = Math.floor((Date.now() - _thinkingStartedAt) / 1000);
    if (elapsed >= LONG_WAIT_SECONDS) {
      label.textContent =
        `분석이 오래 걸리고 있습니다 (${elapsed}s). ` +
        `필요하면 '취소' 버튼을 눌러 중단할 수 있습니다`;
    } else if (elapsed >= 10) {
      label.textContent = `생각하는 중 (${elapsed}s)`;
    }
  }, 1000);
}

function hideThinking() {
  const el = document.getElementById('thinkingIndicator');
  if (el) el.remove();
  if (_thinkingTimer) {
    clearInterval(_thinkingTimer);
    _thinkingTimer = null;
  }
}

// ─── 스트리밍 메시지 ───
function startStreamingMessage() {
  hideThinking();
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const inner = document.getElementById('messagesInner');
  const div = document.createElement('div');
  div.className = 'message';
  div.id = 'streamingMessage';

  div.innerHTML = `
    <div class="message-header">
      <img src="/static/images.png" alt="N" class="message-avatar assistant" style="object-fit:cover;">
      <div class="message-sender">Nexus</div>
    </div>
    <div class="model-thinking" id="streamingThinking" style="display:none"></div>
    <div class="message-body streaming-cursor" id="streamingBody"></div>`;

  // 스트리밍 thinking 상태 초기화
  // 서버(Qwen3.5)는 enable_thinking=false라 기본적으로 <think> 태그를
  // 보내지 않는다. 따라서 UI도 "일반 모드"로 시작한다. <think>가 등장할
  // 때만 thinking 모드로 전환한다.
  _streamThinking = false;
  _streamThinkBuf = '';

  inner.appendChild(div);
  scrollToBottom();
  return div;
}

// 스트리밍 중 thinking 상태 (기본: 일반 모드)
let _streamThinking = false;
let _streamThinkBuf = '';

function appendStreamChunk(text) {
  const thinkEl = document.getElementById('streamingThinking');
  const body = document.getElementById('streamingBody');
  if (!body) return;

  if (_streamThinking) {
    // 현재 thinking 모드 — </think>가 오면 종료하고 이후 텍스트를 본문에
    const closeIdx = text.indexOf('</think>');
    if (closeIdx !== -1) {
      _streamThinkBuf += text.substring(0, closeIdx);
      _streamThinking = false;
      if (thinkEl && _streamThinkBuf.trim()) {
        const short = _streamThinkBuf.trim().substring(0, 120).replace(/\n/g, ' ');
        thinkEl.textContent = short;
        thinkEl.style.display = 'block';
      }
      const after = text.substring(closeIdx + 8);
      if (after) body.textContent += after;
    } else {
      _streamThinkBuf += text;
      if (thinkEl) {
        thinkEl.textContent = _streamThinkBuf.trim().substring(0, 80).replace(/\n/g, ' ');
        thinkEl.style.display = 'block';
      }
    }
  } else {
    // 일반 모드 — <think>가 등장하면 thinking 모드로 진입, 아니면 본문에 append
    const openIdx = text.indexOf('<think>');
    if (openIdx !== -1) {
      // <think> 이전 부분은 본문에
      if (openIdx > 0) body.textContent += text.substring(0, openIdx);
      _streamThinking = true;
      const afterOpen = text.substring(openIdx + 7);
      // 같은 청크에 </think>까지 있는 경우 재귀 처리
      if (afterOpen) appendStreamChunk(afterOpen);
    } else {
      body.textContent += text;
    }
  }
  scrollToBottom();
}

function finalizeStreamingMessage() {
  const body = document.getElementById('streamingBody');
  const thinkEl = document.getElementById('streamingThinking');
  if (body) {
    body.classList.remove('streaming-cursor');
    let raw = body.textContent;
    // 만약 </think> 없이 스트림이 끝났는데 thinking 중이었다면 버퍼의
    // 내용을 본문에 합쳐 넣는다 (사용자에게 빈 응답 방지)
    if (_streamThinking && _streamThinkBuf.trim() && !raw.trim()) {
      raw = _streamThinkBuf.trim();
      body.textContent = raw;
    }
    body.innerHTML = formatContent(raw);
    body.removeAttribute('id');

    const session = sessions.find(s => s.id === currentSessionId);
    if (session) {
      session.messages.push({ role: 'assistant', content: raw });
    }
  }
  if (thinkEl) thinkEl.removeAttribute('id');
  const msg = document.getElementById('streamingMessage');
  if (msg) msg.removeAttribute('id');
  // 상태 리셋 — 다음 스트림도 기본 "일반 모드"로 시작
  _streamThinking = false;
  _streamThinkBuf = '';
}

// ─── 전송 ───
// _activeAbortController는 스트리밍 도중 사용자가 '취소'를 눌렀을 때 fetch를
// 중단하는 AbortController. 취소 시 서버에 의해 producer_task가 CancelledError
// 로 종료되고 query_engine의 finally 블록에서 트랜스크립트에 에러 엔트리가 남는다.
let _activeAbortController = null;

function cancelStream() {
  if (_activeAbortController) {
    _activeAbortController.abort();
  }
}

// 전송 버튼을 '전송'/'취소' 모드로 토글한다. HTML/onclick까지 직접 교체하여
// 전용 취소 버튼을 추가하지 않고도 같은 자리에서 기능을 스위치한다.
function setSendButtonMode(mode) {
  const btn = document.getElementById('sendBtn');
  if (!btn) return;
  if (mode === 'cancel') {
    btn.title = '취소';
    btn.setAttribute('data-mode', 'cancel');
    btn.disabled = false;
    btn.onclick = cancelStream;
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>`;
  } else {
    btn.title = '전송';
    btn.setAttribute('data-mode', 'send');
    btn.disabled = false;
    btn.onclick = sendMessage;
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
      </svg>`;
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  let text = input.value.trim();
  if (!text && attachedFiles.length === 0) return;
  if (isStreaming) return;

  // 첨부파일 내용을 메시지에 추가
  if (attachedFiles.length > 0) {
    const fileContents = await readFileContents();
    text = fileContents + (text ? '\n\n' + text : '\n\n위 첨부파일을 분석해 주세요.');
    attachedFiles = [];
    renderAttachPreview();
  }

  input.value = '';
  autoResize(input);
  appendMessage('user', text);

  isStreaming = true;
  // 전송 → 취소 모드 전환. 사용자는 같은 버튼으로 중단 가능.
  setSendButtonMode('cancel');

  showThinking();
  let streamStarted = false;
  let userAborted = false;
  _activeAbortController = new AbortController();

  try {
    const response = await fetch('/v1/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: currentSessionId,
      }),
      signal: _activeAbortController.signal,
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        // ':'로 시작하는 라인은 SSE 주석(heartbeat 등). 무시한다.
        if (line.startsWith(':')) continue;
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.substring(6));

            if (data.text && !streamStarted) {
              streamStarted = true;
              startStreamingMessage();
            }

            if (data.text) {
              appendStreamChunk(data.text);
            }

            // 토큰 사용량 업데이트
            if (data.type === 'usage_update' && data.usage) {
              totalInputTokens = data.usage.input_tokens || totalInputTokens;
              totalOutputTokens = data.usage.output_tokens || totalOutputTokens;
              updateTokenDisplay();
            }

            // message_stop에서도 토큰 확인
            if (data.type === 'message_stop') {
              // 출력 토큰을 텍스트 길이로 추정 (서버에서 안 오는 경우)
              if (totalOutputTokens === 0 && streamStarted) {
                const body = document.getElementById('streamingBody');
                if (body) {
                  totalOutputTokens += Math.ceil(body.textContent.length / 4);
                  totalInputTokens += Math.ceil(text.length / 4);
                  updateTokenDisplay();
                }
              }
            }

            if (data.type === 'error' && data.message) {
              if (!streamStarted) {
                streamStarted = true;
                startStreamingMessage();
              }
              appendStreamChunk(`[오류] ${data.message}\n`);
            }
          } catch (e) { /* JSON 파싱 실패 무시 */ }
        }
      }
    }
  } catch (error) {
    if (error && error.name === 'AbortError') {
      userAborted = true;
      if (!streamStarted) startStreamingMessage();
      appendStreamChunk(`\n[취소됨] 사용자가 요청을 중단했습니다.`);
    } else {
      if (!streamStarted) startStreamingMessage();
      appendStreamChunk(`[연결 오류] ${error.message}`);
    }
  }

  hideThinking();
  if (streamStarted) finalizeStreamingMessage();
  isStreaming = false;
  _activeAbortController = null;
  setSendButtonMode('send');
  input.focus();
  // 취소로 종료된 경우 사용자가 같은 메시지를 다시 보내도록 입력란에 복원하지는 않는다
  // (원본 메시지는 이미 화면에 'user' 버블로 남아 있음).
  void userAborted;
}

// ─── 헬스체크 ───
async function checkHealth() {
  const dot = document.getElementById('statusDot');
  try {
    const resp = await fetch('/health');
    const data = await resp.json();
    dot.className = data.status === 'ok' ? 'status-dot' : 'status-dot offline';
    dot.title = `GPU: ${data.gpu_server}`;
  } catch {
    dot.className = 'status-dot offline';
    dot.title = '서버 연결 실패';
  }
}

// ─── UI 유틸 ───
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
  requestAnimationFrame(() => {
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 50);
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}
</script>
