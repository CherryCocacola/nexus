# =============================================================================
# Project Nexus — 메인 설정 파일
# 우선순위: CLI 인자 > 환경변수(NEXUS_ 접두사) > 이 파일 > 기본값
# =============================================================================

# GPU 서버 (Machine B) 연결 설정
gpu_server:
  url: "http://192.168.22.28:8001"
  embedding_url: "http://192.168.22.28:8002"
  timeout_seconds: 120.0
  max_retries: 10
  retry_base_delay: 0.5
  health_check_interval: 30.0

# Redis (단기 메모리 / 세션 캐시) — docutil-redis 컨테이너 공유
redis:
  host: "192.168.10.39"
  port: 6340
  db: 6
  password: "docutil_redis_2024"
  socket_timeout: 5.0

# PostgreSQL + pgvector (장기 메모리) — docutil-postgres 컨테이너, nexus DB
postgresql:
  host: "192.168.10.39"
  port: 5440
  database: "nexus"
  user: "nexus"
  password: "idino@12"
  min_connections: 2
  max_connections: 10

# 모델 설정 — Qwen 3.5 27B Dense AWQ (v7.0 모델 전환)
# Dense 아키텍처 → vLLM LoRA 핫로딩 지원 (학교별/기업별 동적 전환)
# primary_model: vLLM의 served-model-name.
#
# 2026-04-17 Phase 3 적용: nexus-phase1 → nexus-phase3
#   Phase 3의 개선점:
#   1. tokenizer.apply_chat_template으로 tool_calls를 Qwen3.5 공식 XML
#      포맷(<tool_call><function=...><parameter=...>)으로 직렬화 —
#      vLLM qwen3_xml 파서와 호환
#   2. 장문 지식(knowledge_explanation) 카테고리 15% 추가로 긴 설명 능력 회복
#   3. subagent_use_scout 프롬프트 10→30 확대로 탐색 시나리오 다양화
#   학습 결과: train_loss=0.06946 (Phase 1 0.073, Phase 2 0.168 대비 최저)
model:
  primary_model: "nexus-phase3"
  auxiliary_model: "exaone-7.8b"
  embedding_model: "multilingual-e5-large"
  max_context_tokens: 8192
  default_temperature: 0.7
  default_max_tokens: 4096

# v7.0 Part 2.5 — 쿼리 라우팅 (2026-04-21)
# Phase 3 LoRA가 도구 호출은 강화했지만 일반 지식 표현을 좁히는 부작용 발생.
# 실측 A/B/C/D에서 베이스 qwen3.5-27b(LoRA OFF)가 인문학/교양 질문에서 우수.
# 질의를 분류하여 KNOWLEDGE_MODE는 베이스 모델, TOOL_MODE는 Phase3 LoRA로 분기.
# TIER_M 이상으로 업그레이드 시 enabled: false로 끄고 단일 경로로 회귀한다.
routing:
  enabled: true
  long_input_threshold: 500   # 이 글자수 이상이면 TOOL_MODE (문서 첨부 간주)

  # 분류기 종류 — 현재 지원: "heuristic" (기본)
  # 향후 "llm_classifier", "embedding_classifier" 등을 추가할 수 있도록 확장 지점 마련
  classifier_type: "heuristic"

  # 질의 본문에 아래 키워드 중 하나라도 포함되면 TOOL_MODE로 분류.
  # 운영자가 코드 변경 없이 튜닝할 수 있도록 yaml에 명시적으로 나열한다
  # (2026-04-22 리팩토링 4: 외부화). 누락 시 core/config.py의 기본값을 사용.
  tool_keywords:
    # 한국어 — 파일/프로젝트/도구 명시 힌트
    - "파일"
    - "첨부"
    - "업로드"
    - "이 프로젝트"
    - "코드베이스"
    - "디렉토리"
    - "폴더"
    - "리포지토리"
    - "리포지터리"
    - "읽어줘"
    - "읽어 줘"
    - "편집해"
    - "수정해"
    - "모듈 구조"
    - "디렉토리 구조"
    - "프로젝트 구조"
    # 영어
    - "file"
    - "attached"
    - "upload"
    - "this project"
    - "codebase"
    - "repository"
    - "directory"
    - "folder"
    # 도구 이름 — 괄호 포함(함수 호출 스타일)
    - "Read("
    - "Write("
    - "Edit("
    - "Bash("
    - "Glob("
    - "Grep("
    - "Agent("
    - "DocumentProcess"
    # 도구 이름 — 대문자 + 공백 (Read 도구 / Edit the file 등)
    - "Read "
    - "Write "
    - "Edit "
    - "Bash "
    - "Glob "
    - "Grep "
    - "Agent "
    - " LS "
    # 확장자 힌트 (공백 뒤 경로 패턴)
    - ".py "
    - ".md "
    - ".yaml "
    - ".json "
    # 프로젝트 내부 디렉토리 prefix
    - "core/"
    - "web/"
    - "tests/"
    - "training/"
    - "deployment/"
    - "cli/"
    - "config/"
    - "scripts/"
    - "tools/"

  # 단어 경계 매칭 (2026-04-22 리팩토링 6)
  # substring은 "file"이 "filename"에 오탐하는 한계가 있어, 영어 용어는 여기에 등록한다.
  # 비어 있으면 단어 경계 규칙을 적용하지 않는다.
  tool_word_patterns: []

  # 정규식 매칭 — 복잡한 패턴이 필요한 경우에만 사용한다.
  # 유효성은 운영자 책임 (잘못된 regex는 로드 시 경고 후 무시).
  tool_regex_patterns: []

  knowledge_mode:
    model: "qwen3.5-27b"      # 베이스 — LoRA 어댑터 미적용
    temperature: 0.2
    max_tokens: 2048
    enable_thinking: false
    description: "일반 지식 QA"
  tool_mode:
    model: "nexus-phase3"     # Phase 3 LoRA — 도구 호출 특화
    temperature: 0.3
    max_tokens: 4096
    enable_thinking: false
    description: "도구 호출 / 프로젝트 작업"

# 세션 설정
session:
  sessions_dir: ".nexus/sessions"
  max_turns: 50
  max_budget_seconds: 300.0
  session_ttl_hours: 24
  transcript_enabled: true

# 보안 설정
security:
  sandbox_enabled: true
  sandbox_timeout_seconds: 30.0
  max_file_size_bytes: 10485760  # 10MB
  bash_deny_patterns:
    - 'rm\s+-rf\s+/'
    - ':(){ :\|:& };:'
    - 'dd\s+if=/dev/zero'
    - 'mkfs\.'
    - '>\s*/dev/sd'

# 운영 설정
log_level: "INFO"
log_file: null
watch_files: false
debug: false

# 에어갭 모드 (외부 네트워크 차단)
air_gap_mode: true
